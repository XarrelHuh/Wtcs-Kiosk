/* ========================= */

function getNodes(){
    if(current===1) return nodesFloor1;
    if(current===2) return nodesFloor2;
    return nodesFloor3;
}

function getRooms(){
    if(current===1) return roomsFloor1;
    if(current===2) return roomsFloor2;
    return roomsFloor3;

function dist(a,b){
    return Math.hypot(a.x-b.x,a.y-b.y);
}

/* =========================
   SEGMENT PROJECTION
========================= */

function pointToSegmentDistance(px,py,x1,y1,x2,y2){

    const A=px-x1;
    const B=py-y1;
    const C=x2-x1;
    const D=y2-y1;

    const dot=A*C+B*D;
    const lenSq=C*C+D*D;

    let param=-1;

    if(lenSq!==0){
        param=dot/lenSq;
    }

    let xx,yy;

    if(param<0){
        xx=x1;
        yy=y1;
    }
    else if(param>1){
        xx=x2;
        yy=y2;
    }
    else{
        xx=x1+param*C;
        yy=y1+param*D;
    }

    return{
        dist:Math.hypot(px-xx,py-yy),
        x:xx,
        y:yy
    };
}

/* =========================
   CONNECT ROOMS
========================= */

function connectRooms(nodes,rooms){

    for(let r in rooms){

        let bestProjection=null;
        let bestDist=Infinity;
        let bestSegment=null;

        for(let n in nodes){

            for(let nb of nodes[n].neighbors){

                const a=nodes[n];
                const b=nodes[nb];

                const proj=pointToSegmentDistance(
                    rooms[r].x,
                    rooms[r].y,
                    a.x,
                    a.y,
                    b.x,
                    b.y
                );

                if(proj.dist<bestDist){

                    bestDist=proj.dist;

                    bestProjection={
                        x:proj.x,
                        y:proj.y
                    };

                    bestSegment=[n,nb];
                }
            }
        }

        rooms[r].segment=bestSegment;
        rooms[r].hallwayPoint=bestProjection;
    }
}

connectRooms(nodesFloor1,roomsFloor1);

connectRooms(nodesFloor3,roomsFloor3);

/* =========================
   PATHFINDING
========================= */

function shortestPath(start,end,nodes){

    let distMap={},prev={},unvisited=new Set(Object.keys(nodes));

    for(let n of unvisited){
        distMap[n]=Infinity;
    }

    distMap[start]=0;

    while(unvisited.size){

        let cur=[...unvisited].reduce((a,b)=>
            distMap[a]<distMap[b]?a:b
        );

        if(cur===end) break;

        unvisited.delete(cur);

        for(let nb of nodes[cur].neighbors){

            let alt=distMap[cur]+dist(nodes[cur],nodes[nb]);

            if(alt<distMap[nb]){
                distMap[nb]=alt;
                prev[nb]=cur;
            }
        }
    }

    let path=[],u=end;

    while(u){
        path.unshift(u);
        u=prev[u];
    }

    return path;
}

function pathLength(path,nodes){

    let total=0;

    for(let i=0;i<path.length-1;i++){

        total+=dist(
            nodes[path[i]],
            nodes[path[i+1]]
        );
    }

    return total;
}

/* =========================

const positions={
    1:{x:0.353,y:0.227},
    2:{x:0.256,y:0.220},

function showImage(callback){

    const img=document.getElementById("mapImage");

    img.onload=()=>{

        resizeCanvas();

        if(callback){
            callback();
        }
    };

    img.src = images[current-1];
}
    function resizeCanvas(){
    const canvas = document.getElementById("mapCanvas");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    drawYou();
}

function getImageRect(){
    const img = document.getElementById("mapImage");
    const r = img.getBoundingClientRect();

    return {
        x: r.left,
        y: r.top,
        width: r.width,
        height: r.height
    };
}

function drawYou(){

    const c = document.getElementById("mapCanvas");
    const ctx = c.getContext("2d");

    ctx.clearRect(0,0,c.width,c.height);

    const img = document.getElementById("mapImage");
    const rect = getImageRect();

    let p = positions[current];

    let x = rect.x + p.x * rect.width;
    let y = rect.y + p.y * rect.height;

    ctx.fillStyle = "red";

    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x - 10, y - 20);
    ctx.lineTo(x + 10, y - 20);
    ctx.fill();
}

function drawPath(roomId){

    const canvas = document.getElementById("mapCanvas");
    const ctx = canvas.getContext("2d");

    drawYou();

    const img = document.getElementById("mapImage");
    const rect = getImageRect();

    const rooms = getRooms();
    const nodes = getNodes();

    const room = rooms[roomId];
    if(!room) return;

    const [segA, segB] = room.segment;

    const pathA = shortestPath("START", segA, nodes);
    const pathB = shortestPath("START", segB, nodes);

    const path =
        pathLength(pathA, nodes) < pathLength(pathB, nodes)
        ? pathA
        : pathB;

    ctx.strokeStyle = "blue";
    ctx.lineWidth = 4;

    ctx.beginPath();

    let start = positions[current];

    ctx.moveTo(
        rect.x + start.x * rect.width,
        rect.y + start.y * rect.height
    );

    for(let n of path){

        let p = nodes[n];

        ctx.lineTo(
            rect.x + p.x * rect.width,
            rect.y + p.y * rect.height
        );
    }

    ctx.lineTo(
        rect.x + room.hallwayPoint.x * rect.width,
        rect.y + room.hallwayPoint.y * rect.height
    );

    ctx.lineTo(
        rect.x + room.x * rect.width,
        rect.y + room.y * rect.height
    );

    ctx.stroke();
}

function goToRoom(){

    let input=document.getElementById("roomInput")
        .value
        .trim()
        .toUpperCase();

    let msg=document.getElementById("floorMessage");

    if(roomsFloor1[input]){
        current=1;
    }
    else if(roomsFloor2[input]){
        current=2;
    }
    else if(roomsFloor3[input]){
        current=3;
    }
    else{
        msg.textContent="Room not found";

        document.getElementById("roomInput").value="";

        document.getElementById("roomInput").focus();

        return;
    }

currentRoom = input;

    showImage(()=>{
    drawPath(input);
});

    msg.textContent="Navigating to "+input;

    document.getElementById("roomInput").value="";

    document.getElementById("roomInput").focus();
}

/* =========================

========================= */

document.getElementById("roomInput")
.addEventListener("keydown",(e)=>{

    if(e.key==="Enter"){

        goToRoom();
    }
});

/* =========================
   #1 = A
   #2 = B
========================= */

let hashPressed = false;
let hashTimer = null;

document.addEventListener("keydown", (e) => {
    const input = document.getElementById("roomInput");

    // DO NOT force focus every keypress (this was breaking it)
    
    const key = e.key;

    // Detect hash start
    if (key === "#") {
        hashPressed = true;

        clearTimeout(hashTimer);
        hashTimer = setTimeout(() => {
            hashPressed = false;
        }, 1000); // reset if user doesn't press next key fast

        return;
    }

    if (!hashPressed) return;

    // Accept both top row + numpad keys
    if (key === "1" || key === "Numpad1") {
        e.preventDefault();
        input.value += "A";
    }

    if (key === "2" || key === "Numpad2") {
        e.preventDefault();
        input.value += "B";
    }

    hashPressed = false;
    clearTimeout(hashTimer);
});

/* =========================
   INIT
========================= */

showImage();

setTimeout(()=>{

    document.getElementById("roomInput").focus();

},300);
