<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>School Map Navigation</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    margin: 0;
    background: #000; /* removes white edges */
    overflow: hidden; /* no scrollbars */
}

/* Top UI (floating) */
.topUI {
    position: absolute;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 8px;
}

input {
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px 14px;
    border: none;
    border-radius: 8px;
    background: #4f46e5;
    color: white;
    cursor: pointer;
}

/* FULLSCREEN MAP */
.container {
    position: relative;
    width: 100vw;
    height: 100vh;
}

/* Image */
img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* full image always visible */
}

/* Arrows ON IMAGE */
.arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 30px;
    background: rgba(255,255,255,0.6);
    border-radius: 50%;
    padding: 14px;
    cursor: pointer;
    opacity: 0;
    transition: 0.3s;
    z-index: 5;
}

.left { left: 20px; }
.right { right: 20px; }

/* Show when hovering map */
.container:hover .arrow {
    opacity: 1;
}

/* Bottom info (floating) */
.bottomUI {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    color: white;
    z-index: 10;
}

#floorMessage {
    margin-top: 5px;
    background: rgba(0,0,0,0.5);
    padding: 8px 12px;
    border-radius: 6px;
}
</style>
</head>

<body>

<!-- Floating Search -->
<div class="topUI">
    <input type="number" id="roomInput" placeholder="Enter room (e.g. 203)">
    <button onclick="goToRoom()">Go</button>
</div>

<!-- FULLSCREEN MAP -->
<div class="container">
    <img id="mapImage">

    <!-- Arrows ON IMAGE -->
    <div class="arrow left" onclick="prevFloor()">◀</div>
    <div class="arrow right" onclick="nextFloor()">▶</div>
</div>

<!-- Bottom Info -->
<div class="bottomUI">
    <div id="floorIndicator">Floor 1</div>
    <div id="floorMessage"></div>
</div>

<script>
let images = ["floor1.png", "floor2.png", "floor3.png"];
let current = 0;

function showImage() {
    document.getElementById("mapImage").src = images[current];
    document.getElementById("floorIndicator").textContent = "Floor " + (current + 1);
}

function nextFloor() {
    current = (current + 1) % images.length;
    showImage();
}

function prevFloor() {
    current = (current - 1 + images.length) % images.length;
    showImage();
}

function goToRoom() {
    let input = document.getElementById("roomInput").value.trim();
    let message = document.getElementById("floorMessage");

    if (!/^\d{3}$/.test(input)) {
        message.textContent = "Enter a valid 3-digit room number.";
        return;
    }

    let floor = parseInt(input.charAt(0));

    if (floor >= 1 && floor <= images.length) {
        current = floor - 1;
        showImage();

        if (floor === 2) {
            message.textContent = "Take the stairs to the second floor.";
        } 
        else if (floor === 3) {
            message.textContent = "Take the stairs to the third floor.";
        } 
        else {
            message.textContent = "";
        }

    } else {
        message.textContent = "Room must be in the 100s, 200s, or 300s.";
    }
}

showImage();
</script>

</body>
</html>
