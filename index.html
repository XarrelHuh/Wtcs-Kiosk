<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>School Map Navigation</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Public+Sans&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    margin: 0;
    background: #000;
    overflow: hidden;
}

.topUI {
    position: absolute;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 8px;
}

input {
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px 14px;
    border: none;
    border-radius: 8px;
    background: #4f46e5;
    color: white;
    cursor: pointer;
}

.container {
    position: relative;
    width: 100vw;
    height: 100vh;
}

img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

#mapCanvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

.bottomUI {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    color: white;
    z-index: 10;
}

#floorMessage {
    margin-top: 5px;
    background: rgba(0,0,0,0.5);
    padding: 8px 12px;
    border-radius: 6px;
}
</style>
</head>

<body>

<div class="topUI">
    <input type="text" id="roomInput" placeholder="Enter room (e.g. 203)">
    <button onclick="goToRoom()">Go</button>
</div>

<div class="container">
    <img id="mapImage">
    <canvas id="mapCanvas"></canvas>
</div>

<div class="bottomUI">
    <div id="floorMessage"></div>
</div>

<script>

let images = ["floor1.png", "floor2.png", "floor3.png"];
let current = 1;

/* =========================
   HALLWAY GRAPH
========================= */
const nodes = {
    A: { x: 0.148, y: 0.499, neighbors: ["B"] },
    B: { x: 0.150, y: 0.201, neighbors: ["A", "C", "START"] }, // ← added START
    C: { x: 0.372, y: 0.187, neighbors: ["B", "D", "START"] }, // ← added START
    START: { x: 0.256, y: 0.220, neighbors: ["B", "C"] },      // ← new node at your position
    D: { x: 0.375, y: 0.273, neighbors: ["C", "E"] },
    E: { x: 0.410, y: 0.279, neighbors: ["D", "F"] },
    F: { x: 0.411, y: 0.350, neighbors: ["E", "G"] },
    G: { x: 0.486, y: 0.350, neighbors: ["F", "H", "I"] },
    H: { x: 0.496, y: 0.363, neighbors: ["G", "J", "L"] },
    I: { x: 0.497, y: 0.142, neighbors: ["G"] },
    J: { x: 0.478, y: 0.683, neighbors: ["H", "K"] },
    K: { x: 0.634, y: 0.714, neighbors: ["J"] },
    L: { x: 0.644, y: 0.378, neighbors: ["H", "M"] },
    M: { x: 0.770, y: 0.400, neighbors: ["L"] }
};

/* =========================
   ROOMS
========================= */
const rooms = {
    "248": { x: 0.278, y: 0.161 },
    "249": { x: 0.286, y: 0.214 },
    "250": { x: 0.312, y: 0.217 },
    "251": { x: 0.338, y: 0.204 },
    "252": { x: 0.335, y: 0.157 },
    "253": { x: 0.384, y: 0.170 },
    "254": { x: 0.383, y: 0.193 },
    "263": { x: 0.430, y: 0.319 },
    "268": { x: 0.504, y: 0.141 },
    "271": { x: 0.501, y: 0.259 },
    "271A": { x: 0.504, y: 0.332 },
    "273": { x: 0.545, y: 0.388 },
    "266": { x: 0.524, y: 0.383 },
    "266A": { x: 0.504, y: 0.472 },
    "266B": { x: 0.503, y: 0.515 },
    "278A": { x: 0.642, y: 0.393 },
    "278B": { x: 0.629, y: 0.488 },
    "279A": { x: 0.536, y: 0.557 },
    "279B": { x: 0.582, y: 0.564 },
    "209": { x: 0.508, y: 0.676 },
    "207": { x: 0.544, y: 0.681 },
    "205": { x: 0.579, y: 0.682 },
    "203": { x: 0.618, y: 0.691 },
    "210A": { x: 0.481, y: 0.715 },
    "210": { x: 0.506, y: 0.718 },
    "208": { x: 0.521, y: 0.718 },
    "206": { x: 0.560, y: 0.727 },
    "204": { x: 0.596, y: 0.735 },
    "202": { x: 0.635, y: 0.737 },
    "274A": { x: 0.741, y: 0.367 },
    "274B": { x: 0.752, y: 0.365 }
};

/* ========================= */
function dist(a, b) {
    return Math.hypot(a.x - b.x, a.y - b.y);
}

function connectRooms() {
    for (let r in rooms) {
        let closest = null;
        let min = Infinity;

        for (let n in nodes) {
            let d = dist(rooms[r], nodes[n]);
            if (d < min) {
                min = d;
                closest = n;
            }
        }

        rooms[r].node = closest;
    }
}

function shortestPath(start, end) {
    let distMap = {};
    let prev = {};
    let unvisited = new Set(Object.keys(nodes));

    for (let n of unvisited) distMap[n] = Infinity;
    distMap[start] = 0;

    while (unvisited.size) {
        let currentNode = [...unvisited].reduce((a, b) =>
            distMap[a] < distMap[b] ? a : b
        );

        if (currentNode === end) break;

        unvisited.delete(currentNode);

        for (let neighbor of nodes[currentNode].neighbors) {
            let alt = distMap[currentNode] + dist(nodes[currentNode], nodes[neighbor]);

            if (alt < distMap[neighbor]) {
                distMap[neighbor] = alt;
                prev[neighbor] = currentNode;
            }
        }
    }

    let path = [];
    let u = end;

    while (u) {
        path.unshift(u);
        u = prev[u];
    }

    return path;
}

function getClosestNode(pos) {
    let closest = null;
    let min = Infinity;

    for (let n in nodes) {
        let d = dist(pos, nodes[n]);
        if (d < min) {
            min = d;
            closest = n;
        }
    }

    return closest;
}

function drawPath(roomId) {
    const canvas = document.getElementById("mapCanvas");
    const ctx = canvas.getContext("2d");

    drawYouAreHere();

    const room = rooms[roomId];
    if (!room) return;

    const startPos = positions[current];
    const startNode = "START"; // ← was hardcoded "B", now uses the entrance node
    const endNode = room.node;

    const path = shortestPath(startNode, endNode);

    ctx.strokeStyle = "blue";
    ctx.lineWidth = 4;
    ctx.beginPath();

    // START FROM YOU
    ctx.moveTo(startPos.x * canvas.width, startPos.y * canvas.height);

    // follow hallway nodes
    for (let n of path) {
        let p = nodes[n];
        ctx.lineTo(p.x * canvas.width, p.y * canvas.height);
    }

    // go to room
    ctx.lineTo(room.x * canvas.width, room.y * canvas.height);

    ctx.stroke();
}
/* ========================= UI ========================= */

const positions = {
    1: { x: 0.256, y: 0.220 },
    2: { x: 0.296, y: 0.119 }
};

function showImage() {
    const img = document.getElementById("mapImage");

    img.src = images[current];

    img.onload = () => {
        resizeCanvas();
        drawYouAreHere();
    };
}

function resizeCanvas() {
    const canvas = document.getElementById("mapCanvas");
    const img = document.getElementById("mapImage");

    canvas.width = img.clientWidth;
    canvas.height = img.clientHeight;
}

function goToRoom() {
    let input = document.getElementById("roomInput").value.trim();
    let message = document.getElementById("floorMessage");

    if (!rooms[input]) {
        message.textContent = "Room not found.";
        return;
    }

    current = 1;
    showImage();

    setTimeout(() => {
        drawPath(input);
    }, 200);

    message.textContent = "Navigating to room " + input;
}

function drawYouAreHere() {
    const canvas = document.getElementById("mapCanvas");
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const pos = positions[current];
    if (!pos) return;

    const x = pos.x * canvas.width;
    const y = pos.y * canvas.height;

    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x - 10, y - 20);
    ctx.lineTo(x + 10, y - 20);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "black";
    ctx.font = "14px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("You are here", x, y - 30);
}

/* INIT */
connectRooms();
showImage();

</script>

</body>
</html>
