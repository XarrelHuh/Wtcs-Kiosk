<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Public+Sans&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    margin: 0;
    background: #000;
    overflow: hidden;
}

.topUI {
    position: absolute;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 8px;
}

input {
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px 14px;
    border: none;
    border-radius: 8px;
    background: #4f46e5;
    color: white;
    cursor: pointer;
}

.container {
    position: relative;
    width: 100vw;
    height: 100vh;
}

img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

#mapCanvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

.bottomUI {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    color: white;
    z-index: 10;
}

#floorMessage {
    margin-top: 5px;
    background: rgba(0,0,0,0.5);
    padding: 8px 12px;
    border-radius: 6px;
}
</style>

</head>

<body>

<div class="topUI">
    <input type="number" id="roomInput" placeholder="Enter room (e.g. 203)">
    <button onclick="goToRoom()">Go</button>
</div>

<div class="container">
    <img id="mapImage">
    <canvas id="mapCanvas"></canvas>
</div>

<div class="bottomUI">
    <div id="floorMessage"></div>
</div>

<script>

let images = ["floor1.png", "floor2.png", "floor3.png"];
let current = 0;

const nodes = {};

const positions = {
    1: { x: 0.256, y: 0.220 },
    2: { x: 0.296, y: 0.119 }
};

function showImage() {
    const img = document.getElementById("mapImage");
    img.src = images[current];
    img.onload = () => {
        resizeCanvas();
        drawYouAreHere();
    };
}

function resizeCanvas() {
    const canvas = document.getElementById("mapCanvas");
    const img = document.getElementById("mapImage");
    canvas.width = img.clientWidth;
    canvas.height = img.clientHeight;
}

document.getElementById("roomInput").addEventListener("keypress", function (e) {
    if (e.key === "Enter") goToRoom();
});

function goToRoom() {
    let input = document.getElementById("roomInput").value.trim();
    let message = document.getElementById("floorMessage");

    if (!/^\d{3}$/.test(input)) {
        message.textContent = "Enter a valid 3-digit room number.";
        return;
    }

    let floor = parseInt(input.charAt(0));

    if (floor >= 1 && floor <= images.length) {
        current = floor - 1;
        showImage();
        message.textContent = "Navigating to room " + input;
    } else {
        message.textContent = "Room not found.";
    }
}

function drawYouAreHere() {
    const canvas = document.getElementById("mapCanvas");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const pos = positions[current];
    if (!pos) return;

    const x = pos.x * canvas.width;
    const y = pos.y * canvas.height;

    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x - 10, y - 20);
    ctx.lineTo(x + 10, y - 20);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "black";
    ctx.font = "14px 'Public Sans'";
    ctx.textAlign = "center";
    ctx.fillText("You are here", x, y - 30);
}

function keepFocus() {
    const input = document.getElementById("roomInput");
    if (document.activeElement !== input) input.focus();
}

setInterval(keepFocus, 1000);

showImage();

</script>

</body>
</html>
